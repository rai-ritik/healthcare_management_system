<script>
var API = "http://localhost:4000/api";

var tk = localStorage.getItem("hea_token");
if (tk) {
  var u = JSON.parse(localStorage.getItem("hea_user") || "{}");
  goTo(u.role);
}

function goTo(r) {
  if (r === "admin")       location.href = "admin-dashboard.html";
  else if (r === "doctor") location.href = "doctor-dashboard.html";
  else                     location.href = "patient-dashboard.html";
}

function fill() {
  document.getElementById("email").value    = "admin@hea.com";
  document.getElementById("password").value = "password";
}

function msg(text, type) {
  var a = document.getElementById("alert");
  a.textContent = text;
  a.className   = "alert show " + type;
}

document.getElementById("login-form").addEventListener("submit", function(e) {
  e.preventDefault();
  var email = document.getElementById("email").value.trim();
  var pwd   = document.getElementById("password").value;
  var btn   = document.getElementById("btn");

  if (!email || !pwd) { return msg("Enter email and password", "error"); }

  btn.disabled    = true;
  btn.textContent = "Signing in...";

  fetch(API + "/auth/login", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ email: email, password: pwd })
  })
  .then(function(r) { return r.json(); })
  .then(function(d) {
    if (d.success) {
      localStorage.setItem("hea_token", d.token);
      localStorage.setItem("hea_user",  JSON.stringify(d.user));
      msg("Welcome " + d.user.name + "! Redirecting...", "success");
      btn.textContent = "Success!";
      setTimeout(function() { goTo(d.user.role); }, 1000);
    } else {
      msg(d.message || "Login failed", "error");
      btn.disabled    = false;
      btn.textContent = "Sign In";
    }
  })
  .catch(function() {
    msg("Cannot connect to server on port 4000", "error");
    btn.disabled    = false;
    btn.textContent = "Sign In";
  });
});
</script>

<script>
var API = 'http://localhost:4000/api';

// Redirect if already logged in
var tk = localStorage.getItem('hea_token');
if (tk) {
  var u = JSON.parse(localStorage.getItem('hea_user') || '{}');
  goTo(u.role);
}

function goTo(role) {
  if (role === 'admin')       window.location.href = 'admin-dashboard.html';
  else if (role === 'doctor') window.location.href = 'doctor-dashboard.html';
  else                        window.location.href = 'patient-dashboard.html';
}

function showAlert(msg, type) {
  var a = document.getElementById('alert');
  document.getElementById('a-icon').textContent = type === 'success' ? '✅' : '❌';
  document.getElementById('a-msg').textContent  = msg;
  a.className = 'alert show ' + type;
  if (type === 'success') {
    setTimeout(function(){ a.className = 'alert'; }, 5000);
  }
}

function setLoad(on) {
  document.getElementById('reg-btn').disabled         = on;
  document.getElementById('b-icon').style.display     = on ? 'none' : 'inline';
  document.getElementById('b-txt').textContent        = on ? 'Creating account...' : 'Create My Account';
  document.getElementById('spin').style.display       = on ? 'block' : 'none';
}

// Password toggles
document.getElementById('eye1').addEventListener('click', function() {
  var i = document.getElementById('pwd');
  i.type = i.type === 'password' ? 'text' : 'password';
  this.textContent = i.type === 'password' ? '👁' : '🙈';
});
document.getElementById('eye2').addEventListener('click', function() {
  var i = document.getElementById('cpwd');
  i.type = i.type === 'password' ? 'text' : 'password';
  this.textContent = i.type === 'password' ? '👁' : '🙈';
});

// Password strength
document.getElementById('pwd').addEventListener('input', function() {
  var v = this.value;
  var s = 0;
  if (v.length >= 6)           s++;
  if (v.length >= 10)          s++;
  if (/[A-Z]/.test(v))        s++;
  if (/[0-9]/.test(v))        s++;
  if (/[^A-Za-z0-9]/.test(v)) s++;
  var labels = ['', 'Weak', 'Fair', 'Good', 'Strong', 'Very Strong'];
  var colors = ['', '#ef4444', '#f59e0b', '#3b82f6', '#10b981', '#059669'];
  var el = document.getElementById('strength');
  el.textContent = v ? 'Strength: ' + (labels[s] || '') : '';
  el.style.color = colors[s] || '';
});

// Form submit
document.getElementById('reg-form').addEventListener('submit', function(e) {
  e.preventDefault();

  var fname = document.getElementById('fname').value.trim();
  var lname = document.getElementById('lname').value.trim();
  var email = document.getElementById('email').value.trim();
  var phone = document.getElementById('phone').value.trim();
  var role  = document.getElementById('role').value;
  var pwd   = document.getElementById('pwd').value;
  var cpwd  = document.getElementById('cpwd').value;
  var terms = document.getElementById('terms').checked;

  // Validations
  if (!fname || !lname) {
    return showAlert('Please enter your first and last name', 'error');
  }
  if (!email) {
    return showAlert('Please enter your email address', 'error');
  }
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
    return showAlert('Please enter a valid email address', 'error');
  }
  if (!role) {
    return showAlert('Please select your role (Patient or Doctor)', 'error');
  }
  if (!pwd || pwd.length < 6) {
    return showAlert('Password must be at least 6 characters', 'error');
  }
  if (pwd !== cpwd) {
    return showAlert('Passwords do not match', 'error');
  }
  if (!terms) {
    return showAlert('Please accept the Terms of Service to continue', 'error');
  }

  setLoad(true);

  fetch(API + '/auth/register', {
    method:  'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      first_name: fname,
      last_name:  lname,
      name:       fname + ' ' + lname,
      email:      email,
      phone:      phone || null,
      password:   pwd,
      role:       role
    })
  })
  .then(function(r) { return r.json(); })
  .then(function(d) {
    if (d.success) {
      localStorage.setItem('hea_token', d.token);
      localStorage.setItem('hea_user',  JSON.stringify(d.user));
      showAlert('Welcome ' + d.user.name + '! Account created!', 'success');
      document.getElementById('b-txt').textContent = '✅ Done! Redirecting...';
      setTimeout(function() { goTo(d.user.role); }, 1200);
    } else {
      showAlert(d.message || 'Registration failed. Try again.', 'error');
      setLoad(false);
    }
  })
  .catch(function(err) {
    showAlert('Cannot connect to server. Is backend running on port 4000?', 'error');
    setLoad(false);
    console.error('Register error:', err);
  });
});

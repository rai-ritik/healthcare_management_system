<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HEA — Login</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <div class="login-wrapper">
    <div class="login-card">

      <!-- Logo -->
      <div class="logo">
        <div class="logo-icon">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24"
            fill="none" stroke="#185FA5" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
            <polyline points="9 22 9 12 15 12 15 22"/>
          </svg>
        </div>
        <div>
          <div class="logo-title">HEA</div>
          <div class="logo-sub">Hospital Management System</div>
        </div>
      </div>

      <hr class="divider" />

      <!-- Role selector -->
      <p class="role-label">Sign in as</p>
      <div class="role-badges" id="roleBadges">
        <button class="badge active" data-role="patient" type="button">Patient</button>
        <button class="badge" data-role="doctor" type="button">Doctor / Nurse</button>
        <button class="badge" data-role="admin" type="button">Administrator</button>
      </div>

      <!-- Form -->
      <div class="field">
        <label for="email">Email address</label>
        <input type="email" id="email" name="email"
          placeholder="you@hospital.org" autocomplete="email" />
        <span class="error-msg" id="emailErr">Please enter a valid email address.</span>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <div class="pw-wrap">
          <input type="password" id="password" name="password"
            placeholder="••••••••" autocomplete="current-password" />
          <button type="button" class="pw-toggle" id="pwToggle" aria-label="Show password">
            <!-- Eye icon -->
            <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="16" height="16"
              viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"
              stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
        <span class="error-msg" id="pwErr">Please enter your password.</span>
      </div>

      <button type="button" class="btn-login" id="loginBtn">Sign in</button>

      <p class="forgot-link"><a href="#">Forgot your password?</a></p>
      <p class="footer-note">University of Trento · DISI · v1.0</p>

    </div>
  </div>

  <script src="login.js"></script>
</body>
</html>
